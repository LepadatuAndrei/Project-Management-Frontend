<div class="d-flex justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow mt-3">
            <div class="card-header">
                <h3 class="text-gray-800">Project List</h3>
            </div>
            <div class="card-body">
                <div [ngSwitch]="projectsPage.length" class="container col-lg-8">
                    <div *ngSwitchCase="0" class="container text-center h4">
                        <span class="spinner-border spinner-border-sm" role="status"></span>
                        Loading projects...
                    </div>
                    <div *ngSwitchDefault>
                        <table class="table align-middle table-striped table-hover table-bordered
                            border-dark text-gray-900">
                            <thead class="align-middle">
                                <tr>
                                    <th scope="col">Project name</th>
                                    <th scope="col">Creation Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let project of projectsPage" type="button"
                                [routerLink]="['Details']" [queryParams]="{id: project.idProject}">
                                    <td>{{project.projectName}}</td>
                                    <td>{{project.projectCreationDate | date: 'mediumDate'}}</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="btn-group" role="group" aria-label="Page navigation">
                            <button type="button" class="btn btn-outline-dark" (click)="changePage(currentPage-1)"
                                [disabled]="currentPage==1">Previous</button>
                            <div [ngSwitch]="currentPage <= 7">
                                <div *ngSwitchCase="false">
                                    <button *ngFor="let i of counter.count(0, 1)" type="button" class="btn btn-outline-dark"
                                        (click)="changePage(i+1)">{{i+1}}</button>
                                    <button type="button" class="btn btn-outline-dark" disabled>...</button>
                                    <button *ngFor="let i of counter.count(currentPage-4, currentPage-1)" type="button"
                                        class="btn btn-outline-dark" (click)="changePage(i+1)">{{i+1}}</button>
                                </div>
                                <div *ngSwitchDefault>
                                    <button *ngFor="let i of counter.count(0, currentPage-1)" type="button"
                                        class="btn btn-outline-dark" (click)="changePage(i+1)">{{i+1}}</button>
                                </div>
                            </div>
                            <button type="button" class="btn btn-dark" disabled>{{currentPage}}</button>
                            <div [ngSwitch]="totalPageNumber - currentPage + 1 <= 7">
                                <div *ngSwitchCase="false">
                                    <button *ngFor="let i of counter.count(currentPage, currentPage+3)" type="button"
                                        class="btn btn-outline-dark" (click)="changePage(i+1)">{{i+1}}</button>
                                    <button type="button" class="btn btn-outline-dark" disabled>...</button>
                                    <button *ngFor="let i of counter.count(totalPageNumber-1, totalPageNumber)" type="button"
                                        class="btn btn-outline-dark" (click)="changePage(i+1)">{{i+1}}</button>
                                </div>
                                <div *ngSwitchDefault>
                                    <button *ngFor="let i of counter.count(currentPage, totalPageNumber)" type="button"
                                        class="btn btn-outline-dark" (click)="changePage(i+1)">{{i+1}}</button>
                                </div>
                            </div>
                            <button type="button" class="btn btn-outline-dark" (click)="changePage(currentPage+1)"
                                [disabled]="currentPage==totalPageNumber">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
