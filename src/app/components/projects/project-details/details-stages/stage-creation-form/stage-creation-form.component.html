<div class="d-flex flex-column align-items-center">
    <h3>Create new stage</h3>
    <div *ngIf="alertMsg != ''" class="d-inline-flex justify-content-center">
        <div class="alert alert-danger alert-dismissible" role="alert">
            <strong>Error</strong>
            <br>
            {{alertMsg}}
            <button type="button" class="btn-close" (click)="alertMsg=''"></button>
        </div>
    </div>
    <div class="d-inline-flex">
        <form #createStageForm="ngForm" (submit)="createStage(createStageForm)" style="margin: 2% 0%;">
            <div class="mb-3">
                <label for="stageNameInput" class="form-label">Stage name</label>
                <input class="form-control" #name="ngModel" type="text" name="stageNameInput"
                    id="stageNameInput" ngModel required maxlength="100" style="max-width: 60%;">
                <div *ngIf="name.errors && name.touched">
                    <label *ngIf="name.errors['required']" for="stageNameInput" class="form-label"
                        style="color: red">Stage name is required</label>
                    <label *ngIf="name.errors['maxlength']" for="stageNameInput" class="form-label"
                        style="color: red">Stage name must be up to 100 characters long</label>
                </div>
            </div>
            <div class="mb-3">
                <label for="stageTasksTextarea" class="form-label">Stage tasks</label>
                <textarea class="form-control" #tasks="ngModel" name="stageTasksTextarea"
                id="stageTasksTextarea" rows="4" cols="50" maxlength="10000" ngModel></textarea>
                <div *ngIf="tasks.errors && tasks.touched">
                    <label *ngIf="tasks.errors['maxlength']" for="stageTasksTextarea" class="form-label"
                        style="color: red">Stage tasks must be up to 10000 characters long</label>
                </div>
            </div>
            <div class="d-flex justify-content-center">
                <div class="btn-group" role="group" style="padding-top: 2%;">
                    <button [disabled]="createStageForm.invalid" class="btn btn-outline-primary"
                            type="submit">Submit</button>
                    <button class="btn btn-outline-secondary" (click)="cancel()">
                        Cancel
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
